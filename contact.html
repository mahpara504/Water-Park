<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us | Splash Horizon</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700&family=Open+Sans:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
    /* --- Navbar Styles --- */
.navbar {
    position: sticky;
    top: 0;
    z-index: 1000;
    background: white; /* You can change this to rgba(255, 255, 255, 0.9) for glass effect */
    padding: 15px 0;
    box-shadow: 0 2px 15px rgba(0,0,0,0.05);
}

.nav-container {
    max-width: 1100px;
    margin: 0 auto;
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 0 20px;
}

.nav-logo {
    font-family: 'Montserrat', sans-serif;
    font-size: 1.5rem;
    font-weight: 700;
    text-decoration: none;
    color: var(--primary-green);
    letter-spacing: -1px;
}

.nav-logo span {
    color: var(--water-blue); /* Highlighting 'Horizon' in blue */
}

.nav-links {
    list-style: none;
    display: flex;
    align-items: center;
    gap: 30px;
    margin: 0;
}

.nav-links a {
    text-decoration: none;
    color: var(--text-charcoal);
    font-weight: 600;
    font-size: 0.95rem;
    transition: 0.3s;
}

.nav-links a:hover {
    color: var(--primary-green);
}

/* Small Button inside Nav */
.nav-btn {
    background: var(--primary-green);
    color: white !important;
    padding: 10px 20px;
    border-radius: 50px;
    transition: 0.3s ease !important;
}

.nav-btn:hover {
    background: var(--water-blue);
    transform: translateY(-2px);
}

/* Responsive Menu (Hides links on very small screens) */
@media (max-width: 600px) {
    .nav-links {
        gap: 15px;
    }
    .nav-links li:not(:last-child) {
        display: none; /* Only shows "Book Now" on tiny screens to save space */
    }
}
</style>
</head>
<body>
<nav class="navbar">
    <div class="nav-container">
        <a href="index.html" class="nav-logo">Splash<span>Horizon</span></a>
        <ul class="nav-links">
            <li><a href="index.html">Home</a></li>
            <li><a href="about.html">About</a></li>
            <li><a href="contact.html">Contact</a></li>
            <li><a href="#tickets" class="nav-btn">Book Now</a></li>
        </ul>
    </div>
</nav>
    <header class="hero">
        <h1>Connect With Us</h1>
        <p>Your paradise awaits. Drop us a line below.</p>
    </header>

    <main class="content-wrapper">
        <div class="contact-container">
            <div class="contact-info">
                <h3>Our Oasis</h3>
                <p><strong>Address:</strong><br>404 Tropical Parkway<br>Water Isle, FL 33102</p>
                
                <h3>Support</h3>
                <p><strong>Phone:</strong> +1 (800) SPLASH<br><strong>Email:</strong> help@splashhorizon.com</p>
            </div>

            <form class="contact-form">
                <input type="text" placeholder="Full Name" required>
                <input type="email" placeholder="Email Address" required>
                <textarea rows="4" placeholder="How can we help?"></textarea>
                <button type="submit" class="btn-cta">Send Inquiry</button>
            </form>
        </div>

        <div class="map-box">
            <iframe 
                width="100%" 
                height="100%" 
                frameborder="0" 
                style="border:0" 
                src="https://www.google.com/maps/embed/v1/place?key=YOUR_API_KEY&q=Water+Park,Miami+FL" 
                allowfullscreen>
            </iframe>
            </div>
    </main>

    <footer style="text-align: center; padding: 40px; color: #888;">
        <p>&copy; 2026 Splash Horizon | <a href="index.html" style="color: var(--primary-green);">Home</a></p>
    </footer>

</body>
</html>
